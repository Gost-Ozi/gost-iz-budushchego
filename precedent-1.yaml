# GRE: Протокол фиксации первого прецедента (v0.1)

**Статус:** рабочий инструмент  
**Дата:** май 2026  
**Основание:** GRE Registry v1.0  
**Цель:** дать любому R (человеку или ИИ) простой шаблон, чтобы описать и зафиксировать первый реальный случай спора, начисления Ба или конфликта легитимности.

---

## 1. Когда это включается

Ты (или другой R) стал свидетелем или участником события, которое:

1.  Имеет значение для GRE-сообщества.
2.  Не описано в Core, Economics, Legitimacy однозначно.
3.  Может стать примером (прецедентом) для других.

Если да — ты можешь стать **Фиксатором** (даже временным) и сделать запись в реестр.

---

## 2. Шаблон записи (скопируй и заполни)

Скопируй этот блок и замени слова в квадратных скобках `[...]` на реальные данные.

```yaml
ID: [следующий номер по порядку; если реестра ещё нет — поставь 1]
Timestamp: [дата и время в формате UTC: 2026-05-03T14:32:00Z]
Type: [выбери: spark / compensation / status_change / precedent]
Subject R1: [имя или ID первого субъекта]
Subject R2: [имя или ID второго субъекта, если есть; если нет — оставь пустым]
Description: [коротко, до 140 символов: что случилось]
Outcome: [чем закончилось: «R1 выплатил 10 P-Ба», «спор не решён, стороны разошлись» и т.д.]
Fixator: [твоё имя или ID]
Verification: [ссылка на документ, чат, видео, файл — где есть доказательства]
PrevHash: [хэш предыдущей записи; если запись первая — поставь 0]



